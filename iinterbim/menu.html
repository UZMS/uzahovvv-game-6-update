<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>12th Precinct - Main Menu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #0a0a0a;
            font-family: 'Courier New', monospace;
            cursor: default;
        }

        /* Parallax Background Layers */
        .parallax-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .parallax-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 115%;
            height: 115%;
            background-size: cover;
            background-position: center;
            transition: transform 0.08s ease-out;
        }
        .layer-1 {
            background: linear-gradient(180deg, 
                #0a0a0a 0%, 
                #1a1a1a 30%, 
                #0a0a0a 60%, 
                #050505 100%);
            z-index: 1;
        }

        .layer-2 {
            background: radial-gradient(ellipse at 50% 80%, 
                rgba(60, 60, 60, 0.2) 0%, 
                transparent 50%);
            z-index: 2;
        }

        .layer-3 {
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(150, 150, 150, 0.06) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(80, 80, 80, 0.12) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(120, 120, 120, 0.04) 0%, transparent 60%);
            z-index: 3;
        }

        /* Floating particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 4;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(180, 180, 180, 0.5);
            border-radius: 50%;
            animation: floatParticle linear infinite;
        }

        @keyframes floatParticle {
            0% {
                transform: translateY(100vh) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-10vh) translateX(50px);
                opacity: 0;
            }
        }

        /* Main Menu Container */
        .menu-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: all 0.3s ease;
        }

        /* Game Title */
        .game-title {
            font-size: 52px;
            font-weight: bold;
            letter-spacing: 12px;
            color: #d0d0d0;
            text-shadow: 
                0 0 20px rgba(150, 150, 150, 0.5),
                0 0 40px rgba(100, 100, 100, 0.3),
                0 0 80px rgba(80, 80, 80, 0.2),
                0 5px 10px rgba(0, 0, 0, 0.8);
            margin-bottom: 8px;
            animation: titlePulse 3s ease-in-out infinite;
            text-transform: uppercase;
        }

        .game-subtitle {
            font-size: 14px;
            letter-spacing: 10px;
            color: rgba(180, 180, 180, 0.6);
            margin-bottom: 45px;
            text-shadow: 0 0 10px rgba(150, 150, 150, 0.3);
        }

        @keyframes titlePulse {
            0%, 100% { 
                text-shadow: 
                    0 0 20px rgba(150, 150, 150, 0.5),
                    0 0 40px rgba(100, 100, 100, 0.3),
                    0 0 80px rgba(80, 80, 80, 0.2),
                    0 5px 10px rgba(0, 0, 0, 0.8);
            }
            50% { 
                text-shadow: 
                    0 0 30px rgba(200, 200, 200, 0.7),
                    0 0 60px rgba(150, 150, 150, 0.4),
                    0 0 100px rgba(100, 100, 100, 0.3),
                    0 5px 10px rgba(0, 0, 0, 0.8);
            }
        }

        /* Menu Buttons */
        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        .menu-btn {
            background: linear-gradient(90deg, 
                rgba(15, 15, 15, 0.8) 0%, 
                rgba(30, 30, 30, 0.6) 50%, 
                rgba(15, 15, 15, 0.8) 100%);
            border: 1px solid rgba(150, 150, 150, 0.3);
            color: #c0c0c0;
            font-family: 'Courier New', monospace;
            font-size: 15px;
            letter-spacing: 4px;
            padding: 12px 50px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            text-transform: uppercase;
            min-width: 300px;
            text-align: center;
        }

        .menu-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, 
                transparent 0%, 
                rgba(255, 255, 255, 0.08) 50%, 
                transparent 100%);
            transition: left 0.5s ease;
        }

        .menu-btn:hover::before {
            left: 100%;
        }

        .menu-btn:hover {
            border-color: rgba(255, 255, 255, 0.6);
            color: #ffffff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.6);
            box-shadow: 
                0 0 30px rgba(255, 255, 255, 0.2),
                inset 0 0 30px rgba(255, 255, 255, 0.08);
            transform: scale(1.08);
        }

        .menu-btn:active {
            transform: scale(0.98);
        }

        /* Exit button special styling */
        .menu-btn.exit-btn {
            border-color: rgba(100, 0, 0, 0.3);
        }

        .menu-btn.exit-btn:hover {
            border-color: rgba(200, 0, 0, 0.6);
            color: #ff6666;
            text-shadow: 0 0 10px rgba(255, 50, 50, 0.5);
            box-shadow: 
                0 0 20px rgba(200, 0, 0, 0.2),
                inset 0 0 20px rgba(200, 0, 0, 0.1);
        }

        /* Settings Panel */
        .settings-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            width: 420px;
            max-width: 85vw;
            background: linear-gradient(135deg, 
                rgba(20, 20, 20, 0.95) 0%, 
                rgba(30, 30, 30, 0.95) 100%);
            border: 1px solid rgba(150, 150, 150, 0.3);
            padding: 32px;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            box-shadow: 
                0 0 50px rgba(0, 0, 0, 0.8),
                0 0 100px rgba(60, 60, 60, 0.2);
        }

        .settings-panel.active {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }

        .settings-title {
            font-size: 24px;
            color: #d0d0d0;
            letter-spacing: 6px;
            text-align: center;
            margin-bottom: 25px;
            text-shadow: 0 0 10px rgba(200, 200, 200, 0.3);
        }

        .setting-item {
            margin-bottom: 25px;
        }

        .setting-label {
            display: block;
            color: rgba(180, 180, 180, 0.7);
            font-size: 14px;
            letter-spacing: 3px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .setting-slider {
            width: 100%;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(150, 150, 150, 0.2);
            outline: none;
            cursor: pointer;
        }

        .setting-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            background: #c0c0c0;
            border: 2px solid #ffffff;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(200, 200, 200, 0.5);
            transition: all 0.2s ease;
        }

        .setting-slider::-webkit-slider-thumb:hover {
            background: #ffffff;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.7);
            transform: scale(1.2);
        }

        .setting-value {
            display: inline-block;
            color: #e0e0e0;
            font-size: 14px;
            margin-left: 10px;
            min-width: 40px;
        }

        .settings-close {
            display: block;
            margin: 30px auto 0;
            background: transparent;
            border: 1px solid rgba(150, 150, 150, 0.3);
            color: #c0c0c0;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            letter-spacing: 3px;
            padding: 10px 40px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .settings-close:hover {
            border-color: rgba(255, 255, 255, 0.6);
            color: #ffffff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        /* Overlay for settings */
        .settings-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 99;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .settings-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        /* Transition Overlay - плавный темный переход */
        .transition-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            z-index: 500;
            opacity: 0;
            visibility: hidden;
            transition: opacity 1.5s ease-in-out;
            pointer-events: none;
        }

        .transition-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        /* Red Exit Effect */
        .exit-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, 
                rgba(139, 0, 0, 0.8) 0%, 
                rgba(80, 0, 0, 0.9) 50%, 
                rgba(0, 0, 0, 0.95) 100%);
            z-index: 200;
            opacity: 0;
            visibility: hidden;
            transition: all 0.5s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .exit-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .exit-text {
            font-size: 38px;
            color: #ff0000;
            letter-spacing: 12px;
            text-shadow: 
                0 0 30px rgba(255, 0, 0, 0.8),
                0 0 60px rgba(255, 0, 0, 0.5),
                0 0 100px rgba(139, 0, 0, 0.3);
            animation: exitPulse 1s ease-in-out infinite;
            text-transform: uppercase;
        }

        .exit-subtext {
            font-size: 16px;
            color: rgba(255, 0, 0, 0.6);
            letter-spacing: 5px;
            margin-top: 20px;
            animation: exitFade 2s ease-in-out infinite;
        }

        @keyframes exitPulse {
            0%, 100% { 
                opacity: 1;
                text-shadow: 
                    0 0 30px rgba(255, 0, 0, 0.8),
                    0 0 60px rgba(255, 0, 0, 0.5);
            }
            50% { 
                opacity: 0.7;
                text-shadow: 
                    0 0 50px rgba(255, 0, 0, 1),
                    0 0 100px rgba(255, 0, 0, 0.7),
                    0 0 150px rgba(139, 0, 0, 0.5);
            }
        }

        @keyframes exitFade {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        /* Version info */
        .version-info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(150, 150, 150, 0.3);
            font-size: 12px;
            letter-spacing: 3px;
            z-index: 10;
        }

        /* Vignette effect */
        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, 
                transparent 40%, 
                rgba(0, 0, 0, 0.6) 100%);
            pointer-events: none;
            z-index: 5;
        }

        /* Scanline effect */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                transparent 0px,
                transparent 2px,
                rgba(0, 0, 0, 0.03) 2px,
                rgba(0, 0, 0, 0.03) 4px
            );
            pointer-events: none;
            z-index: 6;
        }

        /* Toggle switch styling */
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 30px;
            float: right;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(100, 100, 100, 0.3);
            border: 1px solid rgba(150, 150, 150, 0.3);
            transition: all 0.3s ease;
            border-radius: 30px;
        }

        .toggle-slider::before {
            position: absolute;
            content: "";
            height: 22px;
            width: 22px;
            left: 3px;
            bottom: 3px;
            background: #888;
            transition: all 0.3s ease;
            border-radius: 50%;
        }

        .toggle-switch input:checked + .toggle-slider {
            background: rgba(200, 200, 200, 0.3);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .toggle-switch input:checked + .toggle-slider::before {
            transform: translateX(30px);
            background: #fff;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
<body>
    <!-- Parallax Background Layers -->
    <div class="parallax-container">
        <div class="parallax-layer layer-1" data-speed="0.02"></div>
        <div class="parallax-layer layer-2" data-speed="0.04"></div>
        <div class="parallax-layer layer-3" data-speed="0.06"></div>
    </div>

    <!-- Floating Particles -->
    <div class="particles" id="particles"></div>

    <!-- Vignette & Scanlines -->
    <div class="vignette"></div>
    <div class="scanlines"></div>


    <!-- Main Menu -->
    <div class="menu-container" id="menuContainer">
        <h1 class="game-title">12TH PRECINCT</h1>
        <p class="game-subtitle">THE BEAST</p>
        
        <div class="menu-buttons">
            <button class="menu-btn" onclick="startGame()">NEW GAME</button>
            <button class="menu-btn" onclick="continueGame()">CONTINUE</button>
            <button class="menu-btn" onclick="openSettings()">SETTINGS</button>
            <button class="menu-btn exit-btn" onclick="exitGame()">EXIT</button>
        </div>

        <div class="version-info">VERSION 1.0.0 | BUILD 2024</div>
    </div>

    <!-- Settings Overlay -->
    <div class="settings-overlay" id="settingsOverlay" onclick="closeSettings()"></div>

    <!-- Settings Panel -->
    <div class="settings-panel" id="settingsPanel">
        <h2 class="settings-title">SETTINGS</h2>
        

        <div class="setting-item">
            <label class="setting-label">Master Volume</label>
            <input type="range" class="setting-slider" min="0" max="100" value="80" 
                   oninput="updateSetting('masterVolume', this.value)">
            <span class="setting-value" id="masterVolumeValue">80%</span>
        </div>

        <div class="setting-item">
            <label class="setting-label">Music Volume</label>
            <input type="range" class="setting-slider" min="0" max="100" value="70" 
                   oninput="updateSetting('musicVolume', this.value)">
            <span class="setting-value" id="musicVolumeValue">70%</span>
        </div>

        <div class="setting-item">
            <label class="setting-label">SFX Volume</label>
            <input type="range" class="setting-slider" min="0" max="100" value="90" 
                   oninput="updateSetting('sfxVolume', this.value)">
            <span class="setting-value" id="sfxVolumeValue">90%</span>
        </div>

        <div class="setting-item">
            <label class="setting-label">Mouse Sensitivity</label>
            <input type="range" class="setting-slider" min="1" max="100" value="50" 
                   oninput="updateSetting('sensitivity', this.value)">
            <span class="setting-value" id="sensitivityValue">50%</span>
        </div>

        <div class="setting-item">
            <label class="setting-label">Brightness</label>
            <input type="range" class="setting-slider" min="50" max="150" value="100" 
                   oninput="updateSetting('brightness', this.value)">
            <span class="setting-value" id="brightnessValue">100%</span>
        </div>

        <button class="settings-close" onclick="closeSettings()">BACK</button>
    </div>

    <!-- Exit Overlay -->
    <div class="exit-overlay" id="exitOverlay">
        <div class="exit-text">GOODBYE</div>
        <div class="exit-subtext">Thank you for playing</div>
    </div>

    <!-- Transition Overlay for smooth fade to game -->
    <div class="transition-overlay" id="transitionOverlay"></div>

    <script>
        // Create floating particles
        function createParticles() {
            const container = document.getElementById('particles');
            const particleCount = 50;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDuration = (5 + Math.random() * 10) + 's';
                particle.style.animationDelay = Math.random() * 10 + 's';
                particle.style.width = (1 + Math.random() * 2) + 'px';
                particle.style.height = particle.style.width;
                
                // Random colors for particles (black and white theme)
                const colors = [
                    'rgba(200, 200, 200, 0.5)',
                    'rgba(180, 180, 180, 0.4)',
                    'rgba(150, 150, 150, 0.6)',
                    'rgba(220, 220, 220, 0.3)'
                ];
                particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                
                container.appendChild(particle);
            }
        }

        // Stronger parallax effect on mouse move
        document.addEventListener('mousemove', (e) => {
            const layers = document.querySelectorAll('.parallax-layer');
            const mouseX = e.clientX / window.innerWidth - 0.5;
            const mouseY = e.clientY / window.innerHeight - 0.5;

            layers.forEach(layer => {
                const speed = parseFloat(layer.dataset.speed);
                // Increased parallax multiplier for stronger effect
                const xOffset = mouseX * speed * 200;
                const yOffset = mouseY * speed * 200;
                
                layer.style.transform = `translate(${xOffset}px, ${yOffset}px) scale(1.08)`;
            });

            // Stronger menu container parallax
            const menuContainer = document.getElementById('menuContainer');
            const menuX = mouseX * 25;
            const menuY = mouseY * 25;
            menuContainer.style.transform = `perspective(800px) rotateY(${menuX}deg) rotateX(${-menuY}deg)`;
        });

        // Settings functions
        function openSettings() {
            document.getElementById('settingsOverlay').classList.add('active');
            document.getElementById('settingsPanel').classList.add('active');
        }

        function closeSettings() {
            document.getElementById('settingsOverlay').classList.remove('active');
            document.getElementById('settingsPanel').classList.remove('active');
        }

        function updateSetting(name, value) {
            const valueElement = document.getElementById(name + 'Value');
            if (valueElement) {
                valueElement.textContent = value + '%';
            }
            console.log(name + ': ' + value);
        }

        // Menu button functions - с плавным переходом и звуком flash
        function startGame() {
            const btn = event.target;
            btn.style.transform = 'scale(0.95)';
            setTimeout(() => {
                btn.style.transform = '';
                performTransition();
            }, 200);
        }

        function continueGame() {
            const btn = event.target;
            btn.style.transform = 'scale(0.95)';
            setTimeout(() => {
                btn.style.transform = '';
                performTransition();
            }, 200);
        }

        // Функция плавного перехода с звуком flash
        function performTransition() {
            const transitionOverlay = document.getElementById('transitionOverlay');
            
            // Останавливаем фоновую музыку меню
            menuMusic.pause();
            
            // Запускаем звук flash с громкостью 200%
            flashSound.currentTime = 0;
            flashSound.play().catch(e => console.log('Flash sound failed:', e));
            
            // Активируем плавный темный переход
            transitionOverlay.classList.add('active');
            
            // После завершения затемнения (1.5 секунды) переходим в игру
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1500);
        }

        function exitGame() {
            const overlay = document.getElementById('exitOverlay');
            overlay.classList.add('active');
            
            setTimeout(() => {
                try {
                    window.close();
                } catch(e) {
                    console.log('Window close blocked by browser');
                }
            }, 3000);
        }

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeSettings();
            }
        });

        // Initialize
        createParticles();

        // Add subtle random movement to menu for alive feel
        let time = 0;
        function animateMenu() {
            time += 0.01;
            const menuContainer = document.getElementById('menuContainer');
            const subtleX = Math.sin(time) * 2;
            const subtleY = Math.cos(time * 0.7) * 2;
            
            if (menuContainer.style.transform.includes('perspective')) {
                // Keep the perspective transform
            }
            
            requestAnimationFrame(animateMenu);
        }
        animateMenu();

        // Background music for menu
        const menuMusic = new Audio('звуки/sounds-of-night-village-atmosphere-night-crickets.mp3');
        menuMusic.volume = 0.4;
        menuMusic.loop = true;
        
        // Hover sound
        const hoverSound = new Audio('звуки/beta11_main-menu_звуки_2181b19773767a7.mp3');
        hoverSound.volume = 0.3;

        // Flash sound for transition to game - громкость 200% (2.0)
        const flashSound = new Audio('звуки/recharging-the-camera-flash.mp3');
        flashSound.volume = 2.0;

        // Menu is shown by default - no intro video
        const menuContainer = document.getElementById('menuContainer');
        
        // Start menu music on first interaction
        document.addEventListener('click', () => {
            menuMusic.play().catch(e => console.log('Menu music failed:', e));
        }, { once: true });
        
        document.addEventListener('keydown', () => {
            menuMusic.play().catch(e => console.log('Menu music failed:', e));
        }, { once: true });

        // Add hover sound and ripple effect
        document.querySelectorAll('.menu-btn').forEach(btn => {
            btn.addEventListener('mouseenter', () => {
                // Play hover sound
                hoverSound.currentTime = 0;
                hoverSound.play().catch(e => console.log('Audio play failed:', e));

                // Create ripple effect
                const ripple = document.createElement('div');
                ripple.style.cssText = `
                    position: absolute;
                    top: 50%;
                    left: 50%;
                    width: 0;
                    height: 0;
                    background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 70%);
                    border-radius: 50%;
                    transform: translate(-50%, -50%);
                    animation: rippleEffect 0.6s ease-out forwards;
                    pointer-events: none;
                `;
                btn.appendChild(ripple);
                
                setTimeout(() => ripple.remove(), 600);
            });
        });

        // Add ripple animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes rippleEffect {
                to {
                    width: 300px;
                    height: 300px;
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
