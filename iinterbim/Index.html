                right.y = 0;
                right.normalize();

                const moveVector = new THREE.Vector3(0, 0, 0);
                const speed = movement.currentSpeed;

                if (state.moveForward) moveVector.addScaledVector(forward, speed * delta);
                if (state.moveBackward) moveVector.addScaledVector(forward, -speed * delta);
                if (state.moveLeft) moveVector.addScaledVector(right, -speed * delta);
                if (state.moveRight) moveVector.addScaledVector(right, speed * delta);

                if (modelLoaded) {
                    const newPosition = camera.position.clone().add(moveVector);
                    checkCollision(newPosition, moveVector);
                    camera.position.copy(newPosition);
                    camera.position.y += state.velocity.y * delta;

                    if (camera.position.y < 1.7) {
                        camera.position.y = 1.7;
                        state.velocity.y = 0;
                        state.canJump = true;
                    }
                } else {
                    camera.position.add(moveVector);
                    camera.position.y += state.velocity.y * delta;

                    if (camera.position.y < 1.7) {
                        camera.position.y = 1.7;
                        state.velocity.y = 0;
                        state.canJump = true;
                    }
                }

                checkDoorProximity();

                isMoving = state.moveForward || state.moveBackward || state.moveLeft || state.moveRight;
                isJumping = camera.position.y > 2.1;

                // ========== STAMINA MANAGEMENT ==========
                if (canSprint && isMoving) {
                    stamina.current = Math.max(0, stamina.current - stamina.drainRate * delta);
                } else if (!isMoving || !state.isSprinting) {
                    stamina.current = Math.min(stamina.max, stamina.current + stamina.recoverRate * delta);
                }

                // ========== FATIGUE SOUND (тяжёлые вздохи при низкой стамине) ==========
                const fatigueThreshold = 25; // Красная полоска начинается с 25%
                if (stamina.current <= fatigueThreshold && isMoving) {
                    // Стамина в красной зоне и игрок движется - включаем звук усталости
                    if (!fatigueSoundPlaying) {
                        fatigueSound.play().catch(e => console.log('Fatigue sound failed:', e));
                        fatigueSoundPlaying = true;
                    }
                    // Увеличиваем громкость по мере уменьшения стамины
                    const fatigueAmount = 1 - (stamina.current / fatigueThreshold);
                    fatigueSound.volume = 0.3 + fatigueAmount * 0.4; // от 0.3 до 0.7
                } else {
                    // Стамина восстановилась или игрок не движется - выключаем звук
                    if (fatigueSoundPlaying) {
                        fatigueSound.pause();
                        fatigueSound.currentTime = 0;
                        fatigueSoundPlaying = false;
                    }
                }

                // Head bob phase for weapon animation only (no camera shake)
                if (isMoving && !isJumping) {
                    const sprintBobMultiplier = canSprint ? 1.8 : 1.0;
                    const bobFrequency = movement.headBobFrequency * sprintBobMultiplier;
                    headBobPhase += delta * bobFrequency;
                }

                // ========== WEAPON BEHAVIOR DURING SPRINT ==========
                if (canSprint && isMoving) {
                    weaponSway.setRunningParams();
                } else if (ads.isAiming) {
                    weaponSway.setAimingParams();
                } else {
                    weaponSway.setWalkingParams();
                }


                // Update stamina UI
                updateStaminaUI();
            }

            // Update screen shake effect
            screenShake.update(delta);
            
            // Update muzzle flash effect
            muzzleFlash.update(delta);
            
            // Update weapon sway/inertia system with enhanced parameters
            weaponSway.update(delta, mouseEuler.y, mouseEuler.x, isJumping, state.isSprinting && isMoving, stamina.current);
            
            // Update weapon animation system (holster/reload)
            weaponAnimation.update(delta);

            // Update ADS (Aim Down Sights) system
            ads.update(delta);

            // Update bullets (пистолет)
            for (let i = bullets.length - 1; i >= 0; i--) {
                const bullet = bullets[i];
                bullet.position.add(bullet.userData.velocity.clone().multiplyScalar(delta));
                bullet.userData.life -= delta;

                const bulletPrevPos = bullet.position.clone().sub(bullet.userData.velocity.clone().multiplyScalar(delta));
                const bulletDir = bullet.userData.velocity.clone().normalize();
                const bulletRay = new THREE.Raycaster(bulletPrevPos, bulletDir);
                bulletRay.far = bullet.userData.velocity.length() * delta + 0.1;
                const bulletHits = bulletRay.intersectObjects(collidableObjects, true);

                if (bulletHits.length > 0 || bullet.userData.life <= 0) {
                    if (bulletHits.length > 0) {
                        const impact = new THREE.PointLight(0xff6600, 1, 2);
                        impact.position.copy(bulletHits[0].point);
                        scene.add(impact);
                        setTimeout(() => scene.remove(impact), 100);
                    }

                    scene.remove(bullet);
                    bullets.splice(i, 1);
                }
            }

            // ========== SHOTGUN PELLETS UPDATE ==========
            // Обновление дроби от дробовика
            for (let i = shotgunPellets.length - 1; i >= 0; i--) {
                const pellet = shotgunPellets[i];
                pellet.position.add(pellet.userData.velocity.clone().multiplyScalar(delta));
                pellet.userData.life -= delta;

                const pelletPrevPos = pellet.position.clone().sub(pellet.userData.velocity.clone().multiplyScalar(delta));
                const pelletDir = pellet.userData.velocity.clone().normalize();
                const pelletRay = new THREE.Raycaster(pelletPrevPos, pelletDir);
                pelletRay.far = pellet.userData.velocity.length() * delta + 0.1;
                const pelletHits = pelletRay.intersectObjects(collidableObjects, true);

                if (pelletHits.length > 0 || pellet.userData.life <= 0) {
                    if (pelletHits.length > 0) {
                        // Создаем эффект попадания для каждой дробинки
                        const impact = new THREE.PointLight(0xff8800, 0.5, 1);
                        impact.position.copy(pelletHits[0].point);
                        scene.add(impact);
                        setTimeout(() => scene.remove(impact), 50);
                    }

                    scene.remove(pellet);
                    shotgunPellets.splice(i, 1);
                }
            }
            // ========== END SHOTGUN PELLETS UPDATE ==========

            // ========== SHOTGUN WEAPON SWAY ==========
            // Применяем анимацию покачивания к дробовику (как у пистолета)
            if (isShotgunActive && shotgunModel) {
                // Базовая позиция дробовика
                const shotgunBasePos = new THREE.Vector3(0.0, -0.0, -0.3);
                const shotgunBaseRot = new THREE.Euler(-Math.PI / 45, Math.PI / -1, 0);
                
                // Вычисляем смещения на основе weaponSway (те же что и для пистолета)
                const swayPos = weaponSway.swayOffset.clone();
                const swayRot = weaponSway.swayRotOffset.clone();
                
                // Целевая позиция с учётом покачиваний
                const targetPos = new THREE.Vector3(
                    shotgunBasePos.x + swayPos.x,
                    shotgunBasePos.y + swayPos.y,
                    shotgunBasePos.z + swayPos.z
                );
                
                const targetRot = new THREE.Euler(
                    shotgunBaseRot.x + swayRot.x,
                    shotgunBaseRot.y + swayRot.y,
                    shotgunBaseRot.z + swayRot.z
                );
                
                // Плавная интерполяция позиции
                const swayLerpFactor = 1 - Math.exp(-weaponSway.followSpeed * delta);
                shotgunContainer.position.lerp(targetPos, swayLerpFactor);
                
                shotgunContainer.rotation.x += (targetRot.x - shotgunContainer.rotation.x) * swayLerpFactor;
                shotgunContainer.rotation.y += (targetRot.y - shotgunContainer.rotation.y) * swayLerpFactor;
                shotgunContainer.rotation.z += (targetRot.z - shotgunContainer.rotation.z) * swayLerpFactor;
            }
            // ========== END SHOTGUN WEAPON SWAY ==========

            // Occlusion culling update
            occlusionCulling.update(camera);
            
            // Анимация частиц пыли - бесконечный поток справа налево
            streetLights.forEach(light => {
                if (light.type === 'dust') {
                    const positions = light.mesh.geometry.attributes.position.array;
                    const velocities = light.velocities;
                    const baseX = light.mesh.userData.originalY; // Базовая X позиция
                    
                    for (let i = 0; i < positions.length; i += 3) {
                        positions[i] += velocities[i];     // X - движение влево
                        positions[i + 1] += velocities[i + 1]; // Y - движение вверх
                        positions[i + 2] += velocities[i + 2]; // Z - небольшой дрейф
                        
                        // Если частица улетела влево за границу - телепортируем справа
                        if (positions[i] < baseX - 8) {
                            positions[i] = baseX + 4; // Появляется справа
                            positions[i + 1] = baseX - Math.random() * 4; // Случайная высота
                            positions[i + 2] = (Math.random() - 0.5) * 2; // Случайный Z
                        }
                        
                        // Если частица улетела слишком высоко - сбрасываем
                        if (positions[i + 1] > baseX + 2) {
                            positions[i + 1] = baseX - Math.random() * 3;
                        }
                    }
                    
                    light.mesh.geometry.attributes.position.needsUpdate = true;
                }
            });
            
            
            // === ПОЛНОЕ УДАЛЕНИЕ TУМАНА ПРИ ВКЛЮЧЕННОМ ФОНАРЕ ===
            // Когда фонарь включен, полностью убираем туман чтобы не было серой пелены
            if (flashlight.enabled) {
                // Целевая плотность - 0 (полностью убираем туман)
                targetFogDensity = 0.0;
            } else {
                targetFogDensity = originalFogDensity;
            }
            
            // Плавное изменение плотности тумана
            currentFogDensity += (targetFogDensity - currentFogDensity) * delta * 2;
            scene.fog.density = currentFogDensity;
            
            
            updateTransition();
            postMaterial.uniforms.time.value = elapsed;
            // Обновляем скорость мыши для динамической дисторсии
            if (state.isLocked) {
                const mouseSpeed = Math.abs(mouseEuler.y - (mouseEuler.previousY || 0)) + Math.abs(mouseEuler.x - (mouseEuler.previousX || 0));
                mouseEuler.previousY = mouseEuler.y;
                mouseEuler.previousX = mouseEuler.x;
                postMaterial.uniforms.mouseVelocity.value += (mouseSpeed - postMaterial.uniforms.mouseVelocity.value) * 0.1;
            } else {
                postMaterial.uniforms.mouseVelocity.value *= 0.95;
            }

            // === ИСПРАВЛЕНИЕ: Рендеринг с принудительной очисткой ===
            // Рендерим основную сцену в renderTarget
            renderer.setRenderTarget(renderTarget);
            renderer.clear(); // обязательно очищаем перед рендерингом
            renderer.render(scene, camera);

            // Рендерим пост-обработку на экран
            renderer.setRenderTarget(null);
            renderer.clear(); // очищаем экранный буфер
            postMaterial.uniforms.tDiffuse.value = renderTarget.texture;
            renderer.render(postScene, postCamera);
            
            // Принудительно сообщаем браузеру, что контекст активен
            renderer.resetState();
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderTarget.setSize(window.innerWidth, window.innerHeight);
            postMaterial.uniforms.resolution.value.set(window.innerWidth, window.innerHeight);
        });

        function openGameSettings() {
            document.getElementById('game-settings-overlay').style.display = 'flex';
            document.body.style.cursor = 'default';
            if (document.pointerLockElement) {
                document.exitPointerLock();
            }
        }

        function closeGameSettings() {
            document.getElementById('game-settings-overlay').style.display = 'none';
            document.body.style.cursor = 'none';
            renderer.domElement.requestPointerLock();
        }

        // Add Escape key handler for settings
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                const settingsOverlay = document.getElementById('game-settings-overlay');
                if (settingsOverlay.style.display === 'flex') {
                    closeGameSettings();
                } else {
                    openGameSettings();
                }
            }
        });

        // Start with body cursor hidden
        document.body.style.cursor = 'none';

        // Smooth startup fade-in - синхронизировано с переходом из меню
        setTimeout(() => {
            const startupOverlay = document.getElementById('startup-overlay');
            startupOverlay.style.opacity = '0';
            setTimeout(() => {
                startupOverlay.style.display = 'none';
            }, 2000);
        }, 1500);

        animate();
    </script>
</body>
